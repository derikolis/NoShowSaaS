version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: noshow_postgres
    environment:
      POSTGRES_USER: noshow
      POSTGRES_PASSWORD: noshow123
      POSTGRES_DB: noshow_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: noshow_redis
    ports:
      - '6379:6379'

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: noshow_evolution
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: 'http://localhost:8080'
      # Autenticação
      AUTHENTICATION_TYPE: 'apikey'
      AUTHENTICATION_API_KEY: 'noshow-evolution-key-dev'
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      # QR Code
      QRCODE_LIMIT: '30'
      QRCODE_COLOR: '#175197'
      # Storage em arquivo (v1 não precisa de banco)
      DATABASE_ENABLED: 'false'
      REDIS_ENABLED: 'false'
      # Webhook global desabilitado — configurado por instância
      WEBHOOK_GLOBAL_ENABLED: 'false'
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'false'
      # Logs
      LOG_LEVEL: 'ERROR'
      LOG_COLOR: 'true'
      # Não deletar instância desconectada automaticamente
      DEL_INSTANCE: 'false'
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

volumes:
  postgres_data:
  evolution_data:
